<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e08e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e08e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e08e"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="80" y1="380" x2="432" y2="380" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="310" x2="432" y2="310" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#1e293b" stroke-width="1" opacity="0.2"/>

  <!-- Glow area under chart line -->
  <path d="M80 380 L160 340 L220 360 L280 280 L340 220 L400 140 L432 120 L432 380 Z" fill="url(#glow)"/>

  <!-- Chart line -->
  <path d="M80 380 L160 340 L220 360 L280 280 L340 220 L400 140 L432 120"
        fill="none" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow-filter)"/>

  <!-- End dot -->
  <circle cx="432" cy="120" r="8" fill="#00e08e" filter="url(#glow-filter)"/>

  <!-- R letter -->
  <text x="256" y="320" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700" font-size="220" fill="#e8ecf4" opacity="0.4">R</text>
</svg>
